name: KDP Gold‑Standard Style Check
on:
  push:
    paths:
      - '**/kdp/manuscript/chapter_drafts/**/*.md'
jobs:
  style_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up script permissions
        run: chmod +x scripts/kdp_style_check.sh
      - name: Find changed markdown files
        id: files
        run: |
          echo "files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\\.md$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
      - name: Run style compliance check
        if: steps.files.outputs.files != ''
        run: |
          for f in ${{ steps.files.outputs.files }}; do
            if [[ -f "$f" ]]; then
              echo "Checking style on $f"
              scripts/kdp_style_check.sh "$f"
              git diff --exit-code "$f" || (echo "ERROR: $f fails style guidelines. Run scripts/kdp_style_check.sh locally and commit." && exit 1)
            fi
          done

