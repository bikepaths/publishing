title: "The Moral Physics of Survival"
subtitle: "What the Street Teaches About Human Nature, Dignity, and the Laws We Cannot Break"
author: "Charles J. DiBella"
description: >
  California funneled twenty-four billion dollars into a homelessness budget engine between 2019 and 2026. The unsheltered population expanded relentlessly alongside this historic expenditure. This mathematical failure proves a catastrophic disconnect between state spending and street-level reality. Service agencies depend on the crisis they claim to solve. The Moral Physics of Survival provides the ethical and empirical framework to justify direct, systemic intervention.

  Universal dignity rests on human nature rather than performance or functional capacity. Direct observation across thirty years at street level provides physical evidence. Exposure to elements, sleep deprivation, and chronic trauma destroy prefrontal cortex function. Below this biological floor, choice and consent cease to operate. We are morally obligated to protect the vulnerable through compelled clinical intervention and public utility design. This is not an abstract theory; it is an empirical science mapping the causal mechanisms of municipal collapse.
