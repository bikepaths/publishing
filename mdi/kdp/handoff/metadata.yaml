title: "The Weaponization of Compassion"
subtitle: "Material Deprivation and the Homeless Industrial Complex"
author: "Material Dignity Infrastructure Project"
series: "Material Dignity Series, Book Two"
description: >
  The contemporary urban crisis is not an accidental resource failure. It operates as an engineered institutional strategy designed to maximize tax revenue capture. Municipal authorities deliberately manufacture material deprivation, funneling taxpayer billions into an intervention apparatus that functions as a mechanism of institutional capture. This book traces the twenty-four billion dollar California funding surge, the Los Angeles underground encampment networks, and the empirical federal evidence proving that superficial municipal sweeps accelerate infectious disease. To shatter this predatory cycle and restore ontological security, society must abandon traditional welfare and enforce absolute material dignity.
